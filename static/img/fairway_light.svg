<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Fairway - Light version
    Sailboat navigating right through a channel (fairway).
    Horizontally mirrored, vertically centered, accentuated waves.
  -->
  <defs>
    <linearGradient id="bgL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>

    <linearGradient id="sailL" x1="100%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="50%" stop-color="#f0edff" />
      <stop offset="100%" stop-color="#e0dafb" />
    </linearGradient>

    <linearGradient id="hullL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#c7d2fe" />
    </linearGradient>

    <linearGradient id="shineL" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5" />
      <stop offset="35%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>

    <filter id="sailShadL" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="-2" dy="6" stdDeviation="10" flood-color="#3730a3" flood-opacity="0.35" />
    </filter>

    <radialGradient id="atmoL" cx="50%" cy="52%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>

    <clipPath id="sailClipL">
      <path d="M 264,130 C 182,156 116,223 122,296 C 126,338 177,363 264,370 Z" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgL)" />

  <!-- Atmospheric glow behind boat -->
  <rect width="512" height="512" fill="url(#atmoL)" />

  <!-- Main sail -->
  <path d="M 264,130 C 182,156 116,223 122,296 C 126,338 177,363 264,370 Z"
        fill="url(#sailL)" filter="url(#sailShadL)" />

  <!-- Sail shine -->
  <g clip-path="url(#sailClipL)">
    <ellipse cx="237" cy="213" rx="75" ry="130" fill="url(#shineL)" />
  </g>

  <!-- Jib (front sail) -->
  <path d="M 272,160 C 322,190 350,248 344,303 C 340,326 307,346 272,346 Z"
        fill="#ffffff" opacity="0.5" />

  <!-- Mast -->
  <rect x="266" y="98" width="8" height="278" rx="4" fill="#ffffff" opacity="0.95" />

  <!-- Pennant (wind-curved, attached to mast top) -->
  <path d="M 266,100 C 256,94 240,98 228,104 C 240,110 256,112 266,114 Z" fill="#f0abfc" opacity="0.85" />

  <!-- Hull -->
  <path d="M 374,386 Q 312,374 250,374 Q 167,374 112,386 L 126,406 Q 244,418 362,406 Z"
        fill="url(#hullL)" opacity="0.92" />

  <!-- Water reflection -->
  <path d="M 352,412 Q 244,422 126,412"
        fill="none" stroke="#e0e7ff" stroke-width="1.5" opacity="0.25" stroke-linecap="round" />

  <!-- Wave 1 -->
  <path d="M 40,446 Q 148,426 256,446 Q 364,466 472,446"
        fill="none" stroke="#e0e7ff" stroke-width="3.5" opacity="0.35" stroke-linecap="round" />
  <!-- Wave 2 -->
  <path d="M 55,472 Q 155,454 256,472 Q 357,490 457,472"
        fill="none" stroke="#e0e7ff" stroke-width="3" opacity="0.25" stroke-linecap="round" />
  <!-- Wave 3 -->
  <path d="M 70,496 Q 163,480 256,496 Q 349,512 442,496"
        fill="none" stroke="#e0e7ff" stroke-width="2.5" opacity="0.16" stroke-linecap="round" />
</svg>
