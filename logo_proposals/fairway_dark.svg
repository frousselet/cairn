<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Fairway - Dark version
    Sailboat navigating right through a channel, luminous on navy sky with stars.
    Horizontally mirrored, vertically centered, accentuated waves.
  -->
  <defs>
    <linearGradient id="bgD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c1222" />
      <stop offset="40%" stop-color="#131a3a" />
      <stop offset="100%" stop-color="#0e0f24" />
    </linearGradient>

    <linearGradient id="sailD" x1="100%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <linearGradient id="hullD" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <linearGradient id="shineD" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c7d2fe" stop-opacity="0.4" />
      <stop offset="35%" stop-color="#a5b4fc" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0" />
    </linearGradient>

    <filter id="ambientD" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28" />
    </filter>

    <filter id="sailShadD" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.5" />
    </filter>

    <clipPath id="sailClipD">
      <path d="M 264,130 C 182,156 116,223 122,296 C 126,338 177,363 264,370 Z" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bgD)" />

  <!-- Stars - large bright -->
  <circle cx="68" cy="52" r="2" fill="#e0e7ff" opacity="0.8" />
  <circle cx="432" cy="38" r="2.2" fill="#c7d2fe" opacity="0.9" />
  <circle cx="52" cy="120" r="1.6" fill="#ddd6fe" opacity="0.6" />
  <circle cx="88" cy="62" r="2" fill="#e0e7ff" opacity="0.75" />
  <circle cx="448" cy="80" r="1.8" fill="#c7d2fe" opacity="0.65" />
  <circle cx="108" cy="48" r="1.5" fill="#e0e7ff" opacity="0.5" />
  <circle cx="420" cy="52" r="1.6" fill="#ddd6fe" opacity="0.55" />
  <circle cx="462" cy="108" r="1.8" fill="#e0e7ff" opacity="0.7" />

  <!-- Stars - medium -->
  <circle cx="38" cy="80" r="1.2" fill="#c7d2fe" opacity="0.5" />
  <circle cx="475" cy="62" r="1.3" fill="#e0e7ff" opacity="0.55" />
  <circle cx="480" cy="140" r="1.1" fill="#ddd6fe" opacity="0.4" />
  <circle cx="42" cy="170" r="1.3" fill="#e0e7ff" opacity="0.5" />
  <circle cx="456" cy="168" r="1" fill="#c7d2fe" opacity="0.45" />

  <!-- Stars - small faint -->
  <circle cx="92" cy="28" r="0.8" fill="#a5b4fc" opacity="0.35" />
  <circle cx="140" cy="18" r="0.7" fill="#c7d2fe" opacity="0.3" />
  <circle cx="310" cy="26" r="0.9" fill="#e0e7ff" opacity="0.35" />
  <circle cx="490" cy="42" r="0.7" fill="#ddd6fe" opacity="0.25" />
  <circle cx="28" cy="148" r="0.8" fill="#e0e7ff" opacity="0.3" />
  <circle cx="340" cy="38" r="0.6" fill="#e0e7ff" opacity="0.25" />
  <circle cx="470" cy="26" r="0.7" fill="#a5b4fc" opacity="0.3" />

  <!-- Twinkling cross-stars -->
  <g opacity="0.3">
    <line x1="68" y1="46" x2="68" y2="58" stroke="#e0e7ff" stroke-width="0.6" stroke-linecap="round" />
    <line x1="62" y1="52" x2="74" y2="52" stroke="#e0e7ff" stroke-width="0.6" stroke-linecap="round" />
  </g>
  <g opacity="0.35">
    <line x1="432" y1="31" x2="432" y2="45" stroke="#c7d2fe" stroke-width="0.7" stroke-linecap="round" />
    <line x1="425" y1="38" x2="439" y2="38" stroke="#c7d2fe" stroke-width="0.7" stroke-linecap="round" />
  </g>

  <!-- Ambient glow behind boat -->
  <ellipse cx="232" cy="268" rx="160" ry="180" fill="#6366f1" opacity="0.15" filter="url(#ambientD)" />

  <!-- Main sail -->
  <path d="M 264,130 C 182,156 116,223 122,296 C 126,338 177,363 264,370 Z"
        fill="url(#sailD)" filter="url(#sailShadD)" />

  <!-- Sail shine -->
  <g clip-path="url(#sailClipD)">
    <ellipse cx="237" cy="213" rx="75" ry="130" fill="url(#shineD)" />
  </g>

  <!-- Jib (front sail) -->
  <path d="M 272,160 C 322,190 350,248 344,303 C 340,326 307,346 272,346 Z"
        fill="#818cf8" opacity="0.45" />

  <!-- Mast -->
  <rect x="266" y="98" width="8" height="278" rx="4" fill="#a5b4fc" opacity="0.9" />

  <!-- Pennant (wind-curved, attached to mast top) -->
  <path d="M 266,100 C 256,94 240,98 228,104 C 240,110 256,112 266,114 Z" fill="#e879f9" opacity="0.85" />

  <!-- Hull -->
  <path d="M 374,386 Q 312,374 250,374 Q 167,374 112,386 L 126,406 Q 244,418 362,406 Z"
        fill="url(#hullD)" opacity="0.88" />

  <!-- Water reflection -->
  <path d="M 352,412 Q 244,422 126,412"
        fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.15" stroke-linecap="round" />

  <!-- Wave 1 -->
  <path d="M 40,446 Q 148,426 256,446 Q 364,466 472,446"
        fill="none" stroke="#818cf8" stroke-width="3" opacity="0.2" stroke-linecap="round" />
  <!-- Wave 2 -->
  <path d="M 55,472 Q 155,454 256,472 Q 357,490 457,472"
        fill="none" stroke="#818cf8" stroke-width="2.5" opacity="0.12" stroke-linecap="round" />
  <!-- Wave 3 -->
  <path d="M 70,496 Q 163,480 256,496 Q 349,512 442,496"
        fill="none" stroke="#818cf8" stroke-width="2" opacity="0.07" stroke-linecap="round" />
</svg>
