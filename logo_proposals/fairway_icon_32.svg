<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    Fairway - Favicon / sidebar icon (32x32)
    Simplified sailboat facing right, vertically centered.
  -->
  <defs>
    <linearGradient id="bgI" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
  </defs>

  <rect width="32" height="32" rx="7" fill="url(#bgI)" />

  <!-- Main sail -->
  <path d="M 16.5,8 C 11,10 6,14.5 6.5,19 C 6.8,21.5 11,23.5 16.5,24 Z"
        fill="#ffffff" opacity="0.95" />

  <!-- Jib -->
  <path d="M 17,10.5 C 20,12.5 21.5,16 21,19 C 20.8,20.2 19,21.5 17,21.5 Z"
        fill="#ffffff" opacity="0.5" />

  <!-- Mast -->
  <rect x="16.5" y="5.5" width="1" height="19" rx="0.5" fill="#ffffff" opacity="0.9" />

  <!-- Pennant (wind-curved) -->
  <path d="M 16.5,5.2 Q 14.5,4.2 12.5,5.6 Q 14.5,7 16.5,7 Z" fill="#f0abfc" opacity="0.85" />

  <!-- Hull -->
  <path d="M 23.5,25 Q 16,23.5 8.5,25 L 9.5,26.5 Q 16,27.5 22.5,26.5 Z"
        fill="#ffffff" opacity="0.85" />

  <!-- Waves -->
  <path d="M 4,28.5 Q 16,27 28,28.5" fill="none" stroke="#e0e7ff" stroke-width="1" opacity="0.4" stroke-linecap="round" />
  <path d="M 6,30 Q 16,29 26,30" fill="none" stroke="#e0e7ff" stroke-width="0.8" opacity="0.25" stroke-linecap="round" />
</svg>
