name: Bug report
description: Report a defect or unexpected behaviour in Cairn
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in the sections below so we can reproduce and fix it quickly.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and this has not been reported yet.
          required: true
        - label: I am running a supported version (latest release or `main`).
          required: false
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps to trigger the bug.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened. Include any error messages or tracebacks.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Accounts & access control
        - Context & organisation
        - Assets & suppliers
        - Compliance
        - Risks (ISO 27005 / EBIOS RM)
        - Reports & management review
        - Trust Center
        - Assistant (Ask Cairn)
        - Dashboard & steering
        - Lifecycle & workflow
        - REST API
        - MCP server
        - UI / theming
        - i18n / translations
        - Other / not sure
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Deployment
      options:
        - Docker Compose
        - Local (pure Python)
        - Other
    validations:
      required: false
  - type: dropdown
    id: theme
    attributes:
      label: Theme (if UI-related)
      options:
        - Light
        - Dark
        - Both
        - Not applicable
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Cairn version tag or git commit SHA.
      placeholder: "v0.22.0 or 98b4ec0"
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser & OS
      placeholder: "Firefox 142 on Ubuntu 24.04"
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / logs
      description: Drag-and-drop screenshots or paste relevant logs. For UI issues, test both light and dark mode.
    validations:
      required: false
