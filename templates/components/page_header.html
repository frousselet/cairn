{% load i18n %}
<div class="page-header">
  <div class="page-header__main">
    {% if icon %}<i class="bi bi-{{ icon }} page-header__icon" aria-hidden="true"></i>{% endif %}
    <div class="page-header__text">
      <h1 class="page-header__title mb-0">{{ title }}</h1>
      {% if reference %}<small class="ref page-header__reference">{{ reference }}</small>{% endif %}
      {% if subtitle %}<div class="page-header__subtitle">{{ subtitle }}</div>{% endif %}
    </div>
  </div>
  {% if actions_html %}
  <div class="page-header__actions header-actions">
    {{ actions_html }}
  </div>
  {% endif %}
</div>
