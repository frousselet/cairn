{# Rendered by {% user_badge %} inclusion tag - do not include directly. #}
<span class="user-badge {% if chip %}user-badge--chip {% endif %}{% if block %}d-flex{% else %}d-inline-flex{% endif %} align-items-center" style="gap:{% if chip %}.25rem{% else %}.4rem{% endif %};white-space:nowrap;vertical-align:middle">
  {% if u.avatar %}<img src="{{ avatar_src }}" alt="" style="width:{{ sz }}px;height:{{ sz }}px;border-radius:50%;object-fit:cover;flex-shrink:0;vertical-align:middle;border:2px solid var(--border-light)">{% else %}<span class="d-inline-flex align-items-center justify-content-center" style="width:{{ sz }}px;height:{{ sz }}px;border-radius:50%;{% if chip %}background:var(--accent);color:#fff;font-weight:700{% else %}background:linear-gradient(135deg,var(--accent-soft),color-mix(in srgb,var(--accent) 18%,transparent));color:var(--accent);font-weight:600{% endif %};font-size:{{ font_size }};letter-spacing:.02em;flex-shrink:0;line-height:1">{{ initial }}</span>{% endif %}{% if show_name %}{% if link %}<a href="{% url 'accounts:user-detail' u.pk %}" class="cell-link">{{ u.display_name }}</a>{% else %}<span>{{ u.display_name }}</span>{% endif %}{% endif %}
</span>
